apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echothink-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: auth.echothink.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authentik
                port:
                  name: http
    - host: litellm.echothink.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: litellm
                port:
                  name: http
    - host: dify.echothink.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dify-web
                port:
                  name: http
    - host: dify-api.echothink.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dify-api
                port:
                  name: http
    - host: minio.echothink.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  name: console
