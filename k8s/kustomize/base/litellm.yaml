---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secrets
type: Opaque
data:
  master-key: Y2hhbmdlbWUtbGl0ZWxsbS1tYXN0ZXIta2V5
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  config.yaml: |
    model_list:
      - model_name: gpt-4
        litellm_params:
          model: openai/gpt-4
      - model_name: claude-3
        litellm_params:
          model: anthropic/claude-3-sonnet
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
spec:
  type: ClusterIP
  ports:
    - port: 4000
      targetPort: 4000
      name: http
  selector:
    app.kubernetes.io/component: litellm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  labels:
    app.kubernetes.io/component: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/component: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          ports:
            - containerPort: 4000
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: master-key
            - name: DATABASE_URL
              value: "postgres://echothink:$(POSTGRES_PASSWORD)@postgres:5432/echothink"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: postgres-password
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: litellm-config
