---
apiVersion: v1
kind: Secret
metadata:
  name: authentik-secrets
type: Opaque
data:
  secret-key: Y2hhbmdlbWUtYXV0aGVudGlrLXNlY3JldC1rZXk=
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-config
data:
  AUTHENTIK_LOG_LEVEL: info
  AUTHENTIK_COOKIE_DOMAIN: echothink.local
  AUTHENTIK_DISABLE_UPDATE_CHECK: "false"
  AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: authentik
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 9000
      name: http
    - port: 443
      targetPort: 9443
      name: https
  selector:
    app.kubernetes.io/component: authentik-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  labels:
    app.kubernetes.io/component: authentik-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: authentik-server
  template:
    metadata:
      labels:
        app.kubernetes.io/component: authentik-server
    spec:
      containers:
        - name: authentik
          image: ghcr.io/goauthentik/server:latest
          command: ["ak", "server"]
          ports:
            - containerPort: 9000
              name: http
            - containerPort: 9443
              name: https
          env:
            - name: AUTHENTIK_REDIS__HOST
              value: redis
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: postgres
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__USER
              value: echothink
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: postgres-password
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: secret-key
          envFrom:
            - configMapRef:
                name: authentik-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /-/health/live/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
  labels:
    app.kubernetes.io/component: authentik-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: authentik-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/component: authentik-worker
    spec:
      containers:
        - name: authentik-worker
          image: ghcr.io/goauthentik/server:latest
          command: ["ak", "worker"]
          env:
            - name: AUTHENTIK_REDIS__HOST
              value: redis
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: postgres
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__USER
              value: echothink
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: postgres-password
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: secret-key
          envFrom:
            - configMapRef:
                name: authentik-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
