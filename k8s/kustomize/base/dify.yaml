---
apiVersion: v1
kind: Secret
metadata:
  name: dify-secrets
type: Opaque
data:
  secret-key: Y2hhbmdlbWUtZGlmeS1zZWNyZXQta2V5
---
apiVersion: v1
kind: Service
metadata:
  name: dify-api
spec:
  type: ClusterIP
  ports:
    - port: 5001
      targetPort: 5001
      name: http
  selector:
    app.kubernetes.io/component: dify-api
---
apiVersion: v1
kind: Service
metadata:
  name: dify-web
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app.kubernetes.io/component: dify-web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dify-api
  labels:
    app.kubernetes.io/component: dify-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: dify-api
  template:
    metadata:
      labels:
        app.kubernetes.io/component: dify-api
    spec:
      containers:
        - name: dify-api
          image: langgenius/dify-api:latest
          ports:
            - containerPort: 5001
          env:
            - name: MODE
              value: api
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: secret-key
            - name: DB_USERNAME
              value: echothink
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: postgres-password
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: dify
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "1"
            - name: STORAGE_TYPE
              value: s3
            - name: S3_ENDPOINT
              value: "http://minio:9000"
            - name: S3_BUCKET_NAME
              value: dify-uploads
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-user
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-password
            - name: CELERY_BROKER_URL
              value: "redis://redis:6379/2"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dify-web
  labels:
    app.kubernetes.io/component: dify-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: dify-web
  template:
    metadata:
      labels:
        app.kubernetes.io/component: dify-web
    spec:
      containers:
        - name: dify-web
          image: langgenius/dify-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: CONSOLE_API_URL
              value: "http://dify-api:5001"
            - name: APP_API_URL
              value: "http://dify-api:5001"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dify-worker
  labels:
    app.kubernetes.io/component: dify-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: dify-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/component: dify-worker
    spec:
      containers:
        - name: dify-worker
          image: langgenius/dify-api:latest
          env:
            - name: MODE
              value: worker
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: secret-key
            - name: DB_USERNAME
              value: echothink
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: postgres-password
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: dify
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "1"
            - name: CELERY_BROKER_URL
              value: "redis://redis:6379/2"
            - name: STORAGE_TYPE
              value: s3
            - name: S3_ENDPOINT
              value: "http://minio:9000"
            - name: S3_BUCKET_NAME
              value: dify-uploads
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-user
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-password
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
