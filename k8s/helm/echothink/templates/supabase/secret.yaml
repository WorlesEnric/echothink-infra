apiVersion: v1
kind: Secret
metadata:
  name: {{ include "echothink.fullname" . }}-supabase
  namespace: {{ include "echothink.namespace" . }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "supabase") | nindent 4 }}
type: Opaque
data:
  jwt-secret: {{ (.Values.supabase.jwtSecret | default "changeme-supabase-jwt-secret-at-least-32-chars") | b64enc | quote }}
  anon-key: {{ (.Values.supabase.anonKey | default "changeme-anon-key") | b64enc | quote }}
  service-role-key: {{ (.Values.supabase.serviceRoleKey | default "changeme-service-role-key") | b64enc | quote }}
