apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "echothink.fullname" . }}-postgres
  namespace: {{ include "echothink.namespace" . }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
data:
  postgresql.conf: |
    listen_addresses = '*'
    max_connections = 200
    shared_buffers = 256MB
    effective_cache_size = 768MB
    maintenance_work_mem = 64MB
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    default_statistics_target = 100
    random_page_cost = 1.1
    effective_io_concurrency = 200
    work_mem = 4MB
    min_wal_size = 1GB
    max_wal_size = 4GB
    max_worker_processes = 4
    max_parallel_workers_per_gather = 2
    max_parallel_workers = 4
    max_parallel_maintenance_workers = 2
    log_timezone = 'UTC'
    timezone = 'UTC'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "echothink.fullname" . }}-postgres-init
  namespace: {{ include "echothink.namespace" . }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
data:
  01-extensions.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
    CREATE EXTENSION IF NOT EXISTS pg_trgm;
    CREATE EXTENSION IF NOT EXISTS btree_gin;
    CREATE EXTENSION IF NOT EXISTS uuid-ossp;
  02-databases.sql: |
    CREATE DATABASE supabase;
    CREATE DATABASE dify;
    CREATE DATABASE hatchet;
    CREATE DATABASE langfuse;
    CREATE DATABASE n8n;
    CREATE DATABASE outline;
    CREATE DATABASE gitlab;
