{{- $fullname := include "echothink.fullname" . -}}
{{- $namespace := include "echothink.namespace" . -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullname }}-falkordb
  namespace: {{ $namespace }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "falkordb") | nindent 4 }}
spec:
  serviceName: {{ $fullname }}-falkordb
  replicas: 1
  selector:
    matchLabels:
      {{- include "echothink.componentSelectorLabels" (dict "ctx" . "component" "falkordb") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "echothink.componentLabels" (dict "ctx" . "component" "falkordb") | nindent 8 }}
    spec:
      containers:
        - name: falkordb
          {{- include "echothink.image" (dict "image" .Values.graphiti.falkordb.image "policy" .Values.global.imagePullPolicy) | nindent 10 }}
          ports:
            - containerPort: 6379
              name: redis
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.graphiti.falkordb.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- include "echothink.storageClass" . | nindent 8 }}
        resources:
          requests:
            storage: {{ .Values.graphiti.falkordb.storage.size }}
