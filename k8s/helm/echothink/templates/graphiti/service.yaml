{{- $fullname := include "echothink.fullname" . -}}
{{- $namespace := include "echothink.namespace" . -}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-falkordb
  namespace: {{ $namespace }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "falkordb") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "echothink.componentSelectorLabels" (dict "ctx" . "component" "falkordb") | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-graphiti
  namespace: {{ $namespace }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "graphiti") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "echothink.componentSelectorLabels" (dict "ctx" . "component" "graphiti") | nindent 4 }}
