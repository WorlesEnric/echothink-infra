apiVersion: v1
kind: Service
metadata:
  name: {{ include "echothink.fullname" . }}-litellm
  namespace: {{ include "echothink.namespace" . }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "litellm") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 4000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "echothink.componentSelectorLabels" (dict "ctx" . "component" "litellm") | nindent 4 }}
