apiVersion: v1
kind: Secret
metadata:
  name: {{ include "echothink.fullname" . }}-litellm
  namespace: {{ include "echothink.namespace" . }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "litellm") | nindent 4 }}
type: Opaque
data:
  master-key: {{ (.Values.litellm.masterKey | default "changeme-litellm-master-key") | b64enc | quote }}
