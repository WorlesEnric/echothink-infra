apiVersion: v1
kind: Secret
metadata:
  name: {{ include "echothink.fullname" . }}-minio
  namespace: {{ include "echothink.namespace" . }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "minio") | nindent 4 }}
type: Opaque
data:
  root-user: {{ (.Values.minio.credentials.rootUser | default "minioadmin") | b64enc | quote }}
  root-password: {{ (.Values.minio.credentials.rootPassword | default "changeme-minio") | b64enc | quote }}
