apiVersion: v1
kind: Secret
metadata:
  name: {{ include "echothink.fullname" . }}-langfuse
  namespace: {{ include "echothink.namespace" . }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "langfuse") | nindent 4 }}
type: Opaque
data:
  nextauth-secret: {{ "changeme-langfuse-nextauth-secret" | b64enc | quote }}
  salt: {{ "changeme-langfuse-salt" | b64enc | quote }}
