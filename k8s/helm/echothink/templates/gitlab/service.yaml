apiVersion: v1
kind: Service
metadata:
  name: {{ include "echothink.fullname" . }}-gitlab
  namespace: {{ include "echothink.namespace" . }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "gitlab") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
    - port: 443
      targetPort: https
      protocol: TCP
      name: https
    - port: 22
      targetPort: ssh
      protocol: TCP
      name: ssh
  selector:
    {{- include "echothink.componentSelectorLabels" (dict "ctx" . "component" "gitlab") | nindent 4 }}
