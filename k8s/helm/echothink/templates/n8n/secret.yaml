apiVersion: v1
kind: Secret
metadata:
  name: {{ include "echothink.fullname" . }}-n8n
  namespace: {{ include "echothink.namespace" . }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "n8n") | nindent 4 }}
type: Opaque
data:
  encryption-key: {{ "changeme-n8n-encryption-key" | b64enc | quote }}
