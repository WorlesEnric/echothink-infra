apiVersion: v1
kind: Service
metadata:
  name: {{ include "echothink.fullname" . }}-n8n
  namespace: {{ include "echothink.namespace" . }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "n8n") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5678
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "echothink.componentSelectorLabels" (dict "ctx" . "component" "n8n") | nindent 4 }}
