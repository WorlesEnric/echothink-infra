apiVersion: v1
kind: Secret
metadata:
  name: {{ include "echothink.fullname" . }}-authentik
  namespace: {{ include "echothink.namespace" . }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "authentik") | nindent 4 }}
type: Opaque
data:
  secret-key: {{ (.Values.authentik.secretKey | default "changeme-authentik-secret-key") | b64enc | quote }}
  bootstrap-password: {{ (.Values.authentik.bootstrapPassword | default "changeme-authentik-bootstrap") | b64enc | quote }}
