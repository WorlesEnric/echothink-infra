apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "echothink.fullname" . }}-authentik-server
  namespace: {{ include "echothink.namespace" . }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "authentik-server") | nindent 4 }}
spec:
  replicas: {{ .Values.authentik.replicas }}
  selector:
    matchLabels:
      {{- include "echothink.componentSelectorLabels" (dict "ctx" . "component" "authentik-server") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "echothink.componentLabels" (dict "ctx" . "component" "authentik-server") | nindent 8 }}
    spec:
      containers:
        - name: authentik
          {{- include "echothink.image" (dict "image" .Values.authentik.image "policy" .Values.global.imagePullPolicy) | nindent 10 }}
          command: ["ak", "server"]
          ports:
            - containerPort: 9000
              name: http
              protocol: TCP
            - containerPort: 9443
              name: https
              protocol: TCP
          env:
            - name: AUTHENTIK_REDIS__HOST
              value: {{ include "echothink.fullname" . }}-redis
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: {{ include "echothink.fullname" . }}-postgres
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__USER
              value: {{ .Values.postgres.credentials.username | quote }}
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.credentials.existingSecret | default (printf "%s-postgres" (include "echothink.fullname" .)) }}
                  key: {{ .Values.postgres.credentials.secretKey }}
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authentik.existingSecret | default (printf "%s-authentik" (include "echothink.fullname" .)) }}
                  key: secret-key
          envFrom:
            - configMapRef:
                name: {{ include "echothink.fullname" . }}-authentik
          resources:
            {{- toYaml .Values.authentik.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /-/health/live/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /-/health/ready/
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
