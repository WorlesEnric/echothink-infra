apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "echothink.fullname" . }}-redis
  namespace: {{ include "echothink.namespace" . }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "redis") | nindent 4 }}
spec:
  serviceName: {{ include "echothink.fullname" . }}-redis
  replicas: 1
  selector:
    matchLabels:
      {{- include "echothink.componentSelectorLabels" (dict "ctx" . "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "echothink.componentLabels" (dict "ctx" . "component" "redis") | nindent 8 }}
    spec:
      containers:
        - name: redis
          {{- include "echothink.image" (dict "image" .Values.redis.image "policy" .Values.global.imagePullPolicy) | nindent 10 }}
          command: ["redis-server", "/etc/redis/redis.conf"]
          ports:
            - containerPort: 6379
              name: redis
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/redis
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: {{ include "echothink.fullname" . }}-redis
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- include "echothink.storageClass" . | nindent 8 }}
        resources:
          requests:
            storage: {{ .Values.redis.storage.size }}
