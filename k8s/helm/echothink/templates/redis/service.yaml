apiVersion: v1
kind: Service
metadata:
  name: {{ include "echothink.fullname" . }}-redis
  namespace: {{ include "echothink.namespace" . }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "redis") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "echothink.componentSelectorLabels" (dict "ctx" . "component" "redis") | nindent 4 }}
