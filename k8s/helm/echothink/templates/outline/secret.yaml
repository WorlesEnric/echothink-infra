apiVersion: v1
kind: Secret
metadata:
  name: {{ include "echothink.fullname" . }}-outline
  namespace: {{ include "echothink.namespace" . }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "outline") | nindent 4 }}
type: Opaque
data:
  secret-key: {{ "changeme-outline-secret-key-hex-64" | b64enc | quote }}
  utils-secret: {{ "changeme-outline-utils-secret-hex-64" | b64enc | quote }}
