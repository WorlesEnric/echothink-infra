{{- $fullname := include "echothink.fullname" . -}}
{{- $namespace := include "echothink.namespace" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-outline
  namespace: {{ $namespace }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "outline") | nindent 4 }}
spec:
  replicas: {{ .Values.outline.replicas }}
  selector:
    matchLabels:
      {{- include "echothink.componentSelectorLabels" (dict "ctx" . "component" "outline") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "echothink.componentLabels" (dict "ctx" . "component" "outline") | nindent 8 }}
    spec:
      containers:
        - name: outline
          {{- include "echothink.image" (dict "image" .Values.outline.image "policy" .Values.global.imagePullPolicy) | nindent 10 }}
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: "postgres://{{ .Values.postgres.credentials.username }}:$(POSTGRES_PASSWORD)@{{ $fullname }}-postgres:5432/outline"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.credentials.existingSecret | default (printf "%s-postgres" $fullname) }}
                  key: {{ .Values.postgres.credentials.secretKey }}
            - name: REDIS_URL
              value: "redis://{{ $fullname }}-redis:6379/3"
            - name: URL
              value: "https://outline.{{ .Values.global.domain }}"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.outline.existingSecret | default (printf "%s-outline" $fullname) }}
                  key: secret-key
            - name: UTILS_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.outline.existingSecret | default (printf "%s-outline" $fullname) }}
                  key: utils-secret
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.credentials.existingSecret | default (printf "%s-minio" $fullname) }}
                  key: root-user
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.credentials.existingSecret | default (printf "%s-minio" $fullname) }}
                  key: root-password
            - name: AWS_S3_UPLOAD_BUCKET_NAME
              value: outline-data
            - name: AWS_S3_UPLOAD_BUCKET_URL
              value: "http://{{ $fullname }}-minio:9000"
            - name: AWS_S3_FORCE_PATH_STYLE
              value: "true"
            - name: FILE_STORAGE
              value: s3
          resources:
            {{- toYaml .Values.outline.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
