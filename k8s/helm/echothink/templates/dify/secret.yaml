apiVersion: v1
kind: Secret
metadata:
  name: {{ include "echothink.fullname" . }}-dify
  namespace: {{ include "echothink.namespace" . }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "dify") | nindent 4 }}
type: Opaque
data:
  secret-key: {{ "changeme-dify-secret-key" | b64enc | quote }}
