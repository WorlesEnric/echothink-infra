{{- if .Values.ingress.enabled }}
{{- $fullname := include "echothink.fullname" . -}}
{{- $namespace := include "echothink.namespace" . -}}
{{- $domain := .Values.global.domain -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}-ingress
  namespace: {{ $namespace }}
  labels:
    {{- include "echothink.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.certManager.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManager.issuer | quote }}
    {{- end }}
    nginx.ingress.kubernetes.io/ssl-redirect: {{ if .Values.ingress.tls.enabled }}"true"{{ else }}"false"{{ end }}
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $domain }}
        - "*.{{ $domain }}"
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    ## Authentik
    - host: auth.{{ $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-authentik
                port:
                  name: http

    ## Supabase (Kong gateway)
    - host: supabase.{{ $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-supabase-kong
                port:
                  name: proxy

    ## Supabase Studio
    - host: studio.{{ $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-supabase-studio
                port:
                  name: http

    ## LiteLLM
    - host: litellm.{{ $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-litellm
                port:
                  name: http

    ## Dify Web
    - host: dify.{{ $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-dify-web
                port:
                  name: http

    ## Dify API
    - host: dify-api.{{ $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-dify-api
                port:
                  name: http

    ## Hatchet
    - host: hatchet.{{ $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-hatchet-api
                port:
                  name: http

    ## Graphiti
    - host: graphiti.{{ $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-graphiti
                port:
                  name: http

    ## Langfuse
    - host: langfuse.{{ $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-langfuse
                port:
                  name: http

    ## n8n
    - host: n8n.{{ $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-n8n
                port:
                  name: http

    ## Outline
    - host: outline.{{ $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-outline
                port:
                  name: http

    ## GitLab
    - host: gitlab.{{ $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-gitlab
                port:
                  name: http

    ## MinIO Console
    - host: minio.{{ $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-minio
                port:
                  name: console

    ## MinIO API (S3)
    - host: s3.{{ $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-minio
                port:
                  name: api
{{- end }}
