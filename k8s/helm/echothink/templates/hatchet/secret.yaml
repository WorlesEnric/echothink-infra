apiVersion: v1
kind: Secret
metadata:
  name: {{ include "echothink.fullname" . }}-hatchet
  namespace: {{ include "echothink.namespace" . }}
  labels:
    {{- include "echothink.componentLabels" (dict "ctx" . "component" "hatchet") | nindent 4 }}
type: Opaque
data:
  cookie-secret: {{ "changeme-hatchet-cookie-secret" | b64enc | quote }}
  encryption-keyset: {{ "changeme-hatchet-encryption-keyset" | b64enc | quote }}
