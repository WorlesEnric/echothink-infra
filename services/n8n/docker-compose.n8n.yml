services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:2.12.0
    platform: linux/amd64
    container_name: n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      # PostgreSQL connection
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n_user
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      DB_POSTGRESDB_SSL_ENABLED: "false"

      # Host configuration
      N8N_HOST: ${N8N_HOST:-n8n.${DOMAIN}}
      N8N_PORT: "5678"
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-https://n8n.${DOMAIN}}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-https://n8n.${DOMAIN}}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      N8N_PROXY_HOPS: ${N8N_PROXY_HOPS:-1}

      # Security
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}

      # Execution settings
      EXECUTIONS_MODE: regular
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      EXECUTIONS_DATA_SAVE_ON_PROGRESS: "true"
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "true"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "336"

      # Timezone
      GENERIC_TIMEZONE: UTC


      # Telemetry
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - echothink-internal
      - echothink-public
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  n8n-data:
    driver: local
