services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: echothink-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks:
      - echothink-internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: echothink-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set echothink http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing echothink/supabase-storage;
      mc mb --ignore-existing echothink/dify-storage;
      mc mb --ignore-existing echothink/outline-data;
      mc mb --ignore-existing echothink/artifacts;
      mc mb --ignore-existing echothink/backups;
      mc mb --ignore-existing echothink/gitlab-artifacts;
      mc mb --ignore-existing echothink/gitlab-uploads;
      mc mb --ignore-existing echothink/gitlab-lfs;
      mc mb --ignore-existing echothink/gitlab-mr-diffs;
      mc mb --ignore-existing echothink/gitlab-packages;
      mc mb --ignore-existing echothink/gitlab-dependency-proxy;
      mc mb --ignore-existing echothink/gitlab-terraform-state;
      mc mb --ignore-existing echothink/gitlab-pages;
      mc mb --ignore-existing echothink/langfuse-events;
      mc mb --ignore-existing echothink/langfuse-media;
      mc anonymous set download echothink/supabase-storage;
      echo 'MinIO buckets initialized successfully';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - echothink-internal

volumes:
  minio-data:
    driver: local
