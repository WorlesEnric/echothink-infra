# Redis Configuration for EchoThink
# Used as shared cache and message broker

# Network
bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 511
tcp-keepalive 300
timeout 0

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence - disabled (ephemeral cache only)
save ""
appendonly no

# Logging
loglevel notice

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client handling
maxclients 10000

# Lua scripting
lua-time-limit 5000

# Latency monitoring
latency-monitor-threshold 100
