version: 1
metadata:
  name: EchoThink Forward Auth Proxy Providers
  labels:
    blueprints.goauthentik.io/description: "Forward auth proxy providers for services without native OIDC"
    blueprints.goauthentik.io/instantiate: "true"

entries:
  # ── Proxy Providers ─────────────────────────────────────────────────

  - model: authentik_providers_proxy.proxyprovider
    id: hatchet-provider
    identifiers:
      name: Hatchet Proxy Provider
    attrs:
      name: Hatchet Proxy Provider
      mode: forward_single
      external_host: https://hatchet.localhost
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, "default-provider-invalidation-flow"]]
      token_validity: hours=24

  - model: authentik_providers_proxy.proxyprovider
    id: langfuse-provider
    identifiers:
      name: Langfuse Proxy Provider
    attrs:
      name: Langfuse Proxy Provider
      mode: forward_single
      external_host: https://langfuse.localhost
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, "default-provider-invalidation-flow"]]
      token_validity: hours=24

  - model: authentik_providers_proxy.proxyprovider
    id: litellm-provider
    identifiers:
      name: LiteLLM Proxy Provider
    attrs:
      name: LiteLLM Proxy Provider
      mode: forward_single
      external_host: https://litellm.localhost
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, "default-provider-invalidation-flow"]]
      token_validity: hours=24

  - model: authentik_providers_proxy.proxyprovider
    id: minio-provider
    identifiers:
      name: MinIO Proxy Provider
    attrs:
      name: MinIO Proxy Provider
      mode: forward_single
      external_host: https://minio.localhost
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, "default-provider-invalidation-flow"]]
      token_validity: hours=24

  - model: authentik_providers_proxy.proxyprovider
    id: supabase-provider
    identifiers:
      name: Supabase Proxy Provider
    attrs:
      name: Supabase Proxy Provider
      mode: forward_single
      external_host: https://supabase.localhost
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, "default-provider-invalidation-flow"]]
      token_validity: hours=24

  - model: authentik_providers_proxy.proxyprovider
    id: supabase-studio-provider
    identifiers:
      name: Supabase Studio Proxy Provider
    attrs:
      name: Supabase Studio Proxy Provider
      mode: forward_single
      external_host: https://studio.localhost
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, "default-provider-invalidation-flow"]]
      token_validity: hours=24

  # ── Applications ─────────────────────────────────────────────────────

  - model: authentik_core.application
    id: hatchet-application
    identifiers:
      slug: hatchet
    attrs:
      name: Hatchet
      slug: hatchet
      provider: !KeyOf hatchet-provider
      meta_launch_url: https://hatchet.localhost/
      meta_description: "Hatchet task orchestration engine"
      policy_engine_mode: any

  - model: authentik_core.application
    id: langfuse-application
    identifiers:
      slug: langfuse
    attrs:
      name: Langfuse
      slug: langfuse
      provider: !KeyOf langfuse-provider
      meta_launch_url: https://langfuse.localhost/
      meta_description: "Langfuse LLM observability"
      policy_engine_mode: any

  - model: authentik_core.application
    id: litellm-application
    identifiers:
      slug: litellm
    attrs:
      name: LiteLLM
      slug: litellm
      provider: !KeyOf litellm-provider
      meta_launch_url: https://litellm.localhost/
      meta_description: "LiteLLM API gateway"
      policy_engine_mode: any

  - model: authentik_core.application
    id: minio-application
    identifiers:
      slug: minio
    attrs:
      name: MinIO
      slug: minio
      provider: !KeyOf minio-provider
      meta_launch_url: https://minio.localhost/
      meta_description: "MinIO object storage"
      policy_engine_mode: any

  - model: authentik_core.application
    id: supabase-application
    identifiers:
      slug: supabase
    attrs:
      name: Supabase
      slug: supabase
      provider: !KeyOf supabase-provider
      meta_launch_url: https://supabase.localhost/
      meta_description: "Supabase backend platform"
      policy_engine_mode: any

  - model: authentik_core.application
    id: supabase-studio-application
    identifiers:
      slug: supabase-studio
    attrs:
      name: Supabase Studio
      slug: supabase-studio
      provider: !KeyOf supabase-studio-provider
      meta_launch_url: https://studio.localhost/
      meta_description: "Supabase Studio dashboard"
      policy_engine_mode: any

  # ── Outpost assignment ───────────────────────────────────────────────

  - model: authentik_outposts.outpost
    id: embedded-outpost
    identifiers:
      name: authentik Embedded Outpost
    attrs:
      name: authentik Embedded Outpost
      type: proxy
      providers:
        - !Find [authentik_core.provider, [name, "n8n Proxy Provider"]]
        - !KeyOf hatchet-provider
        - !KeyOf langfuse-provider
        - !KeyOf litellm-provider
        - !KeyOf minio-provider
        - !KeyOf supabase-provider
        - !KeyOf supabase-studio-provider
