version: 1
metadata:
  name: EchoThink Groups and Service Accounts
  labels:
    blueprints.goauthentik.io/description: "Groups, roles, and service account flow for EchoThink"
    blueprints.goauthentik.io/instantiate: "true"

entries:
  # ── Groups ──────────────────────────────────────────────────────────

  - model: authentik_core.group
    id: group-admins
    attrs:
      name: admins
      is_superuser: true

  - model: authentik_core.group
    id: group-team-members
    attrs:
      name: team-members
      is_superuser: false
      parent: !KeyOf group-admins

  - model: authentik_core.group
    id: group-agents
    attrs:
      name: agents
      is_superuser: false
      attributes:
        description: "AI agent accounts for automated workflows"
        type: agent

  - model: authentik_core.group
    id: group-service-accounts
    attrs:
      name: service-accounts
      is_superuser: false
      attributes:
        description: "Service accounts for inter-service communication"
        type: service

  # ── Service Account Authentication Stages ───────────────────────────

  - model: authentik_stages_identification.identificationstage
    id: service-account-identification-stage
    attrs:
      name: echothink-service-account-identification
      user_fields:
        - username
      case_insensitive_matching: false
      show_matched_user: false

  - model: authentik_stages_password.passwordstage
    id: service-account-password-stage
    attrs:
      name: echothink-service-account-password
      backends:
        - authentik.core.auth.InbuiltBackend
        - authentik.core.auth.TokenBackend
      failed_attempts_before_cancel: 3

  - model: authentik_stages_user_login.userloginstage
    id: service-account-login-stage
    attrs:
      name: echothink-service-account-login
      session_duration: seconds=3600
      remember_me_offset: seconds=0

  # ── Service Account Flow ────────────────────────────────────────────

  - model: authentik_flows.flow
    id: service-account-authentication-flow
    attrs:
      name: EchoThink Service Account Authentication
      title: Service Account Login
      slug: echothink-service-account-authentication
      designation: authentication
      authentication: require_unauthenticated

  # ── Flow Stage Bindings ─────────────────────────────────────────────

  - model: authentik_flows.flowstagebinding
    id: sa-binding-identification
    attrs:
      target: !KeyOf service-account-authentication-flow
      stage: !KeyOf service-account-identification-stage
      order: 10

  - model: authentik_flows.flowstagebinding
    id: sa-binding-password
    attrs:
      target: !KeyOf service-account-authentication-flow
      stage: !KeyOf service-account-password-stage
      order: 20

  - model: authentik_flows.flowstagebinding
    id: sa-binding-login
    attrs:
      target: !KeyOf service-account-authentication-flow
      stage: !KeyOf service-account-login-stage
      order: 30

  # ── Policy: Restrict service account flow to service/agent groups ───

  - model: authentik_policies_expression.expressionpolicy
    id: policy-service-account-only
    attrs:
      name: echothink-service-account-only
      expression: |
        allowed_groups = ["service-accounts", "agents"]
        user_groups = [g.name for g in request.user.ak_groups.all()]
        return any(g in allowed_groups for g in user_groups)

  - model: authentik_policies.policybinding
    id: policy-binding-service-account
    attrs:
      target: !KeyOf service-account-authentication-flow
      policy: !KeyOf policy-service-account-only
      order: 0
      enabled: true
