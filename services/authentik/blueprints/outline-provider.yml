version: 1
metadata:
  name: EchoThink Outline OAuth2 Provider
  labels:
    blueprints.goauthentik.io/description: "OAuth2/OIDC provider for Outline wiki"
    blueprints.goauthentik.io/instantiate: "true"

entries:
  # ── Property Mappings Scope ─────────────────────────────────────────

  - model: authentik_providers_oauth2.scopemapping
    id: outline-openid-scope
    attrs:
      name: outline-openid
      scope_name: openid
      expression: |
        return {
          "sub": request.user.uid,
        }

  - model: authentik_providers_oauth2.scopemapping
    id: outline-email-scope
    attrs:
      name: outline-email
      scope_name: email
      expression: |
        return {
          "email": request.user.email,
          "email_verified": True,
        }

  - model: authentik_providers_oauth2.scopemapping
    id: outline-profile-scope
    attrs:
      name: outline-profile
      scope_name: profile
      expression: |
        return {
          "name": request.user.name,
          "preferred_username": request.user.username,
          "groups": [group.name for group in request.user.ak_groups.all()],
        }

  # ── OAuth2 Provider ─────────────────────────────────────────────────

  - model: authentik_providers_oauth2.oauth2provider
    id: outline-provider
    attrs:
      name: Outline OAuth2 Provider
      client_id: outline
      client_type: confidential
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      redirect_uris: |
        https://DOMAIN_PLACEHOLDER/outline/auth/oidc.callback
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      property_mappings:
        - !KeyOf outline-openid-scope
        - !KeyOf outline-email-scope
        - !KeyOf outline-profile-scope
      sub_mode: user_id
      token_validity: hours=1
      access_code_validity: minutes=1

  # ── Application ─────────────────────────────────────────────────────

  - model: authentik_core.application
    id: outline-application
    attrs:
      name: Outline
      slug: outline
      provider: !KeyOf outline-provider
      meta_launch_url: https://DOMAIN_PLACEHOLDER/outline/
      meta_description: "Outline wiki and knowledge base"
      policy_engine_mode: any
