version: 1
metadata:
  name: EchoThink GitLab OAuth2 Provider
  labels:
    blueprints.goauthentik.io/description: "OAuth2/OIDC provider for GitLab"
    blueprints.goauthentik.io/instantiate: "true"

entries:
  # ── Property Mappings Scope ─────────────────────────────────────────

  - model: authentik_providers_oauth2.scopemapping
    id: gitlab-openid-scope
    attrs:
      name: gitlab-openid
      scope_name: openid
      expression: |
        return {
          "sub": request.user.uid,
        }

  - model: authentik_providers_oauth2.scopemapping
    id: gitlab-email-scope
    attrs:
      name: gitlab-email
      scope_name: email
      expression: |
        return {
          "email": request.user.email,
          "email_verified": True,
        }

  - model: authentik_providers_oauth2.scopemapping
    id: gitlab-profile-scope
    attrs:
      name: gitlab-profile
      scope_name: profile
      expression: |
        return {
          "name": request.user.name,
          "preferred_username": request.user.username,
          "groups": [group.name for group in request.user.ak_groups.all()],
        }

  # ── OAuth2 Provider ─────────────────────────────────────────────────

  - model: authentik_providers_oauth2.oauth2provider
    id: gitlab-provider
    attrs:
      name: GitLab OAuth2 Provider
      client_id: gitlab
      client_type: confidential
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      redirect_uris: |
        https://DOMAIN_PLACEHOLDER/gitlab/users/auth/openid_connect/callback
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      property_mappings:
        - !KeyOf gitlab-openid-scope
        - !KeyOf gitlab-email-scope
        - !KeyOf gitlab-profile-scope
      sub_mode: user_id
      token_validity: hours=1
      access_code_validity: minutes=1

  # ── Application ─────────────────────────────────────────────────────

  - model: authentik_core.application
    id: gitlab-application
    attrs:
      name: GitLab
      slug: gitlab
      provider: !KeyOf gitlab-provider
      meta_launch_url: https://DOMAIN_PLACEHOLDER/gitlab/
      meta_description: "GitLab source code management and CI/CD"
      policy_engine_mode: any
