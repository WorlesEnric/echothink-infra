upstream hatchet-api {
    server hatchet-api:8080;
}

server {
    listen 80;
    server_name hatchet.${DOMAIN};

    client_max_body_size 10m;

    # Authentik forward auth (uncomment when Authentik is configured)
    # include /etc/nginx/snippets/authentik-forward.conf;

    location / {
        proxy_pass http://hatchet-api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300;
    }

    # gRPC support for Hatchet workers
    location /hatchet/ {
        grpc_pass grpc://hatchet-engine:7070;
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;
        grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
