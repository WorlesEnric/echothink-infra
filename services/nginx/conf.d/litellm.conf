upstream litellm-backend {
    server litellm:4000;
}

server {
    listen 80;
    server_name litellm.${DOMAIN};

    client_max_body_size 10m;

    # Authentik forward auth (uncomment when Authentik is configured)
    # include /etc/nginx/snippets/authentik-forward.conf;

    location / {
        proxy_pass http://litellm-backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # Streaming endpoint support
    location /chat/completions {
        proxy_pass http://litellm-backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600;
    }
}
