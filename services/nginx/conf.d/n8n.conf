upstream n8n-backend {
    server n8n:5678;
}

server {
    listen 80;
    listen 443 ssl;
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    server_name n8n.${DOMAIN};

    client_max_body_size 50m;

    # Authentik forward auth (uncomment when Authentik is configured)
    include /etc/nginx/snippets/authentik-forward.conf;

    location / {
        proxy_pass http://n8n-backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # Authentik identity headers (must be repeated here; server-level headers are
        # dropped when a location block defines its own proxy_set_header directives)
        proxy_set_header X-authentik-username $authentik_username;
        proxy_set_header X-authentik-groups $authentik_groups;
        proxy_set_header X-authentik-email $authentik_email;
        proxy_set_header X-authentik-name $authentik_name;
        proxy_set_header X-authentik-uid $authentik_uid;
        proxy_read_timeout 300;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }
}
