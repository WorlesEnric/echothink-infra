upstream langfuse-backend {
    server langfuse:3000;
}

server {
    listen 80;
    listen 443 ssl;
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    server_name langfuse.${DOMAIN};

    client_max_body_size 10m;

    # Authentik forward auth (uncomment when Authentik is configured)
    # include /etc/nginx/snippets/authentik-forward.conf;

    location / {
        proxy_pass http://langfuse-backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
